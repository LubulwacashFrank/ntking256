<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Agro Tech Connect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#0A0E27 0%,#064E3B 60%,#0A0E27 100%);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
    body::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,255,65,0.15),transparent);border-radius:50%;top:-200px;left:-200px;animation:float 20s infinite}
    body::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(57,255,20,0.1),transparent);border-radius:50%;bottom:-150px;right:-150px;animation:float 25s infinite reverse}
    @keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,50px)}}
    .login-container{width:100%;max-width:450px;background:rgba(255,255,255,0.98);border-radius:24px;padding:48px 40px;box-shadow:0 25px 80px rgba(0,0,0,0.5);backdrop-filter:blur(10px);position:relative;z-index:1;border:1px solid rgba(0,255,65,0.2)}
    .logo-section{text-align:center;margin-bottom:36px}
    .logo-icon{width:80px;height:80px;margin:0 auto 16px;background:linear-gradient(135deg,#00FF41,#39FF14);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;box-shadow:0 10px 40px rgba(0,255,65,0.4);animation:logoPulse 2s ease-in-out infinite}
    @keyframes logoPulse{0%,100%{box-shadow:0 10px 40px rgba(0,255,65,0.4)}50%{box-shadow:0 15px 60px rgba(0,255,65,0.6)}}
    .logo-text{font-family:'Poppins',sans-serif;font-size:1.8rem;font-weight:900;background:linear-gradient(135deg,#00FF41,#39FF14);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
    .logo-subtitle{font-size:0.9rem;color:#6B7280;font-weight:600;letter-spacing:2px;text-transform:uppercase}
    .admin-badge{display:inline-block;background:linear-gradient(135deg,#FF6B35,#FF1493);color:#fff;padding:6px 16px;border-radius:20px;font-size:0.75rem;font-weight:700;letter-spacing:1px;margin-bottom:24px}
    h2{font-family:'Poppins',sans-serif;font-size:1.6rem;font-weight:800;color:#111827;margin-bottom:8px;text-align:center}
    .subtitle{text-align:center;color:#6B7280;font-size:0.9rem;margin-bottom:32px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-weight:700;font-size:0.85rem;color:#374151;margin-bottom:8px}
    .input-wrapper{position:relative}
    .input-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#9CA3AF;font-size:1.1rem}
    .form-input{width:100%;padding:14px 16px 14px 48px;border:2px solid #E5E7EB;border-radius:12px;font-size:0.95rem;font-family:'Inter',sans-serif;outline:none;transition:all .3s;background:#F9FAFB}
    .form-input:focus{border-color:#00FF41;box-shadow:0 0 0 4px rgba(0,255,65,0.1);background:#fff}
    .btn-login{width:100%;padding:16px;background:linear-gradient(135deg,#059669,#047857);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:1rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;margin-top:8px;position:relative;overflow:hidden}
    .btn-login::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left .5s}
    .btn-login:hover::before{left:100%}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(5,150,105,0.4)}
    .btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .status-msg{margin-top:16px;padding:12px 16px;border-radius:10px;font-size:0.88rem;font-weight:600;display:none;text-align:center}
    .status-msg.error{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA;display:block}
    .status-msg.success{background:#D1FAE5;color:#065F46;border:1px solid #A7F3D0;display:block}
    .back-link{display:block;text-align:center;margin-top:24px;color:#6B7280;font-size:0.88rem;text-decoration:none;transition:color .2s}
    .back-link:hover{color:#059669}
    .security-note{margin-top:24px;padding:12px;background:#FEF3C7;border-radius:10px;font-size:0.8rem;color:#92400E;text-align:center;border:1px solid #FDE68A}
    .security-note i{color:#F59E0B;margin-right:6px}
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <div class="logo-icon"><i class="fas fa-shield-alt"></i></div>
      <div class="logo-text">Agro Tech</div>
      <div class="logo-subtitle">Admin Portal</div>
      <div class="admin-badge"><i class="fas fa-lock"></i> SECURE ACCESS</div>
    </div>

    <h2>Admin Login</h2>
    <p class="subtitle">Enter your credentials to access the dashboard</p>

    <form id="adminLoginForm">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" class="form-input" id="adminEmail" placeholder="admin@agrotechconnect.ug" required autofocus>
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fas fa-key input-icon"></i>
          <input type="password" class="form-input" id="adminPassword" placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In to Dashboard
      </button>

      <div class="status-msg" id="statusMsg"></div>
    </form>

    <div class="security-note">
      <i class="fas fa-info-circle"></i>
      <strong>Admin Credentials:</strong><br>
      Email: cashfrank@agrotechconnect.ug<br>
      Password: 786419CasH
    </div>

    <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to marketplace</a>
  </div>

  <script>
    function showStatus(msg, isError) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + (isError ? 'error' : 'success');
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

      try {
        const response = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('adminEmail').value,
            password: document.getElementById('adminPassword').value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login failed');
        }

        // Store token
        localStorage.setItem('agro_token', data.token);
        
        showStatus('Login successful! Redirecting...', false);
        
        setTimeout(() => {
          window.location.href = '/admin/dashboard';
        }, 800);

      } catch (err) {
        showStatus(err.message, true);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In to Dashboard';
      }
    });
  </script>
</body>
</html>
